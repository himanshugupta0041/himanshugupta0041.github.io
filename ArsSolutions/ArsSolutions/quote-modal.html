    <!-- <div id="quoteModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-[9999]"> -->
<div id="quoteModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center z-[9999]">
  <div class="bg-white w-full max-w-2xl p-4 rounded-lg shadow-xl relative">


      <button id="closeQuoteModal" class="absolute top-8 right-4 text-gray-500 hover:text-red-500 text-xl">✕</button>

      <h2 class="text-3xl font-bold text-accent mb-6">Request a Quote</h2>

      <form id="quoteForm" class="space-y-5">
          <input type="hidden" name="access_key" value="fa929970-7b13-4d56-a9b2-e3ea52e5e7d0">

          <div class="grid grid-cols-2 gap-5">
              <div>
                  <label class="font-medium text-sm">Full Name *</label>
                  <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg">
              </div>

              <div>
                  <label class="font-medium text-sm">Email *</label>
                  <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg">
              </div>
          </div>

          <div>
              <label class="font-medium text-sm">Phone</label>
              <input type="text" name="phone" class="w-full px-4 py-2 border rounded-lg">
          </div>

          <!-- AUTO-FILLED FIELDS -->
          <div class="grid grid-cols-2 gap-5">
              <div>
                  <label class="font-medium text-sm">Product Name</label>
                  <input type="text" id="quoteProductName" name="product" class="w-full px-4 py-2 border rounded-lg" readonly>
              </div>

              <div>
                  <label class="font-medium text-sm">Category</label>
                  <input type="text" id="quoteCategory" name="category" class="w-full px-4 py-2 border rounded-lg" readonly>
              </div>
          </div>

          <div class="grid grid-cols-2 gap-5">
              <div>
                  <label class="font-medium text-sm">Brand</label>
                  <input type="text" id="quoteBrand" name="brand" class="w-full px-4 py-2 border rounded-lg" readonly>
              </div>

              <div>
                  <label class="font-medium text-sm">SKU</label>
                  <input type="text" id="quoteSKU" name="sku" class="w-full px-4 py-2 border rounded-lg" readonly>
              </div>
          </div>

          <div>
              <label class="font-medium text-sm">Price</label>
              <input type="text" id="quotePrice" name="price" class="w-full px-4 py-2 border rounded-lg" readonly>
          </div>

          <div>
              <label class="font-medium text-sm">Message</label>
              <textarea name="message" rows="3" class="w-full px-4 py-2 border rounded-lg"></textarea>
          </div>

          <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg font-semibold text-lg transition">
              Request a Quote
          </button>

      </form>
  </div>
</div>
